[extraction]
# Available text extractors: pdfplumber (always available), docling, marker
text_extractors = ["pdfplumber"]
# Available field parsers: regex, heuristic (always available), llm, api
field_parsers = ["regex", "heuristic"]
# Reference pages (1-indexed, e.g., "9-13"). Empty = auto-detect via "References" heading
ref_pages = ""
# Use CUDA/MPS for optional marker/docling extractors when PyTorch sees a GPU (no effect on pdfminer)
prefer_gpu = true
# Local LLM (OpenAI-compatible: Ollama, LM Studio, vLLM) to improve BibTeX fields — needs: pip install -e ".[llm]"
# llm_parse_refs = false   # per reference after rule-based parsers
# llm_batch_refs = false   # one call on whole "References" section (needs large context window)
# drop_fragment_refs_after_parse = false   # false = keep every split line for API scoring (recommended for hallucination checks)

[apis.semantic_scholar]
api_key = ""                # or set SEMANTIC_SCHOLAR_API_KEY env var
enabled = true

[apis.crossref]
enabled = true
mailto = ""                 # your email for polite pool (higher rate limits)

[apis.dblp]
enabled = true

[apis.openalex]
api_key = ""                # Required since Feb 2026 — get a free key at https://openalex.org/settings/api-key
enabled = true

[apis.acl_anthology]
enabled = true

[matching]
title_threshold = 0.85
author_threshold = 0.6
# Weights for hallucination score components (must sum to 1.0)
[matching.weights]
title = 0.30
authors = 0.25
author_order = 0.15
year = 0.15
consensus = 0.15

[agent]
enable_retry = true
max_retries = 2

[llm]
enabled = false
base_url = "http://localhost:8000/v1"   # vLLM/Ollama endpoint
model = ""
api_key = ""
# extract_max_tokens = 8192   # completion budget for --llm-extract / --llm-batch
